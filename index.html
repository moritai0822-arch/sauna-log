];
const STAR_LABELS = ["", "最悪", "悪い", "普通", "良い", "最高"];

// ── ユーティリティ ─────────────────────────────────────────────
function avg(scores) {
  const vals = Object.values(scores).filter(Boolean);
  if (!vals.length) return 0;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}
function customAvg(scores, keys) {
  if (!keys || !keys.length) return avg(scores);
  const vals = keys.map(k => scores[k] || 0).filter(Boolean);
  if (!vals.length) return 0;
  return vals.reduce((a, b) => a + b, 0) / vals.length;
}
function countFives(scores) {
  return Object.values(scores).filter(v => v === 5).length;
}
function genId() { return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }

// 複数評価を施設名でグループ化・平均化
function groupByFacility(saunas) {
  const map = {};
  saunas.forEach(s => {
    const key = s.name.trim();
    if (!map[key]) {
      map[key] = { ...s, _entries: [s] };
    } else {
      map[key]._entries.push(s);
      // スコアを累計
      CATEGORIES.forEach(c => {
        map[key].scores[c.key] = (map[key].scores[c.key] || 0) + (s.scores[c.key] || 0);
      });
    }
  });
  // 平均化
  Object.values(map).forEach(g => {
    const n = g._entries.length;
    if (n > 1) {
      CATEGORIES.forEach(c => { g.scores[c.key] = Math.round((g.scores[c.key] / n) * 10) / 10; });
      // 住所・タイプはいずれかから取得
      const withAddr = g._entries.find(e => e.address);
      if (withAddr) g.address = withAddr.address;
      const withType = g._entries.find(e => e.facility_type);
      if (withType) g.facility_type = withType.facility_type;
    }
    g._count = n;
    g._latest = g._entries[g._entries.length - 1].created_at;
  });
  return Object.values(map);
}

// ── コンポーネント ─────────────────────────────────────────────
function ScoreCircle({ value, size }) {
  size = size || 72;
  const r = size/2-6, circ = 2*Math.PI*r, dash = (value/5)*circ;
  const color = value>=4?"#4AB8D4":value>=3?"#C8956A":value>0?"#e05858":"#3a3a40";
  return (
    <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#2a2a2e" strokeWidth={6}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={6}
        strokeDasharray={dash + " " + circ} strokeLinecap="round"
        style={{transition:"stroke-dasharray 0.5s ease"}}/>
      <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle"
        fill={color} fontSize={size>=72?20:size>=56?14:12} fontWeight="700" fontFamily="system-ui"
        style={{transform:"rotate(90deg)",transformOrigin:(size/2)+"px "+(size/2)+"px"}}>
        {value>0?value.toFixed(1):"—"}
      </text>
    </svg>
  );
}

function StarPicker({ value, onChange }) {
  const [hovered, setHovered] = useState(0);
  return (
    <div style={{display:"flex",gap:4,alignItems:"center"}}>
      {[1,2,3,4,5].map(n => {
        const filled = n<=(hovered||value);
        return <button key={n} onClick={()=>onChange(n)}
          onMouseEnter={()=>setHovered(n)} onMouseLeave={()=>setHovered(0)}
          style={{background:"none",border:"none",cursor:"pointer",fontSize:28,lineHeight:1,padding:"2px 1px",
            color:filled?"#4AB8D4":"#3a3a40",transform:filled?"scale(1.1)":"scale(1)",
            transition:"all 0.15s",filter:filled?"drop-shadow(0 0 5px #4AB8D440)":"none"}}>★</button>;
      })}
      {(hovered||value)>0 && <span style={{color:"#8888a0",fontSize:12,marginLeft:4}}>{STAR_LABELS[hovered||value]}</span>}
    </div>
  );
}

// ── 予測検索コンポーネント ─────────────────────────────────────
function NameInput({ value, onChange, allSaunas, onSelectExisting }) {
  const [suggestions, setSuggestions] = useState([]);
  const [showSug, setShowSug] = useState(false);
  const wrapRef = useRef(null);

  useEffect(() => {
    if (!value.trim()) { setSuggestions([]); return; }
    const q = value.trim().toLowerCase();
    const names = [...new Set(allSaunas.map(s => s.name.trim()))];
    const filtered = names.filter(n => n.toLowerCase().includes(q) && n.toLowerCase() !== q);
    setSuggestions(filtered.slice(0, 5));
  }, [value, allSaunas]);

  useEffect(() => {
    function handleClick(e) {
      if (wrapRef.current && !wrapRef.current.contains(e.target)) setShowSug(false);
    }
    document.addEventListener("mousedown", handleClick);
    return () => document.removeEventListener("mousedown", handleClick);
  }, []);

  const handleSelect = (name) => {
    // 既存施設の最新データを取得
    const existing = allSaunas.filter(s => s.name.trim() === name).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at))[0];
    onSelectExisting(name, existing);
    setShowSug(false);
  };

  return (
    <div ref={wrapRef} style={{position:"relative"}}>
      <input type="text" value={value}
        onChange={e=>{ onChange(e.target.value); setShowSug(true); }}
        onFocus={()=>setShowSug(true)}
        placeholder="例：サウナしきじ"
        style={{width:"100%",background:"#26262c",border:"1.5px solid #35353e",borderRadius:10,padding:"13px 15px",color:"#E8EDF2",fontSize:18,fontWeight:600,outline:"none",transition:"border-color 0.2s"}}
        onFocus2={e=>e.target.style.borderColor="#4AB8D4"}
        onBlur={e=>e.target.style.borderColor="#35353e"}
      />
      {showSug && suggestions.length > 0 && (
        <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#26262c",border:"1px solid #35353e",borderRadius:10,zIndex:100,overflow:"hidden",boxShadow:"0 8px 24px #00000080"}}>
          <div style={{padding:"8px 14px 4px",color:"#5a5a6a",fontSize:11,fontWeight:600,letterSpacing:"0.06em"}}>登録済み施設</div>
          {suggestions.map((name,i) => {
            const entries = allSaunas.filter(s=>s.name.trim()===name);
            const ft = entries.find(e=>e.facility_type);
            const t = ft ? FACILITY_TYPES.find(f=>f.key===ft.facility_type) : null;
            return (
              <button key={i} onClick={()=>handleSelect(name)}
                style={{width:"100%",padding:"10px 14px",background:"none",border:"none",borderTop:"1px solid #2e2e36",cursor:"pointer",display:"flex",alignItems:"center",gap:10,textAlign:"left"}}
                onMouseEnter={e=>e.currentTarget.style.background="#2e2e36"}
                onMouseLeave={e=>e.currentTarget.style.background="none"}>
                <span style={{fontSize:18}}>{t?t.icon:"🧖"}</span>
                <div>
                  <div style={{color:"#E8EDF2",fontWeight:600,fontSize:14}}>{name}</div>
                  <div style={{color:"#5a5a6a",fontSize:11,marginTop:1}}>
                    {t?t.label:""}{entries.length>1?" · "+entries.length+"件の評価":""}
                  </div>
                </div>
                <span style={{marginLeft:"auto",color:"#4AB8D4",fontSize:12,fontWeight:600}}>これを選ぶ →</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

function RankingPage({ saunas, onEdit, onDelete, deleting }) {

  const [confirmDelete,  setConfirmDelete]  = useState(null);
  const [expandedId,     setExpandedId]     = useState(null);
  const isAllMode = selectedKeys.length===0;

  const toggleKey = k => setSelectedKeys(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k]);

  // グループ化（複数評価を平均）
  const grouped = groupByFacility(saunas);
  const filtered = facilityFilter==="all" ? grouped : grouped.filter(s=>s.facility_type===facilityFilter);

  const sorted = [...filtered].sort((a,b)=>{
    const va = customAvg(a.scores,isAllMode?null:selectedKeys);
    const vb = customAvg(b.scores,isAllMode?null:selectedKeys);
    if (vb!==va) return vb-va;
    return isAllMode ? countFives(b.scores)-countFives(a.scores) : avg(b.scores)-avg(a.scores);
  });

  const medals = ["#FFD700","#C0C0C0","#CD7F32"];

  const openMap = (address, name) => {
    const q = encodeURIComponent((address||name).trim());
    window.open("https://www.google.com/maps/search/?api=1&query=" + q, "_blank");
  };

  return (
    <div style={{maxWidth:520,margin:"0 auto",padding:"0 0 80px"}}>
      <div style={{background:"linear-gradient(135deg,#0e2a1a,#0e1a2a)",border:"1px solid #1a4a2a",borderRadius:12,padding:"12px 16px",marginBottom:20}}>
        <div style={{color:"#5adf9a",fontSize:12,fontWeight:700,marginBottom:2}}>🔗 共有ルーム</div>
        <div style={{color:"#3a6a4a",fontSize:12}}>このファイルを仲間に送れば同じデータを共有できます</div>
      </div>

      {/* 施設タイプ絞り込み */}
      <div style={{marginBottom:16}}>
        <div style={{color:"#8888a0",fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>施設タイプで絞り込み</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <button onClick={()=>setFacilityFilter("all")}
            style={{padding:"6px 14px",borderRadius:20,fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.15s",
              border:facilityFilter==="all"?"1.5px solid #4AB8D4":"1.5px solid #35353e",
              background:facilityFilter==="all"?"#4AB8D420":"#26262c",
              color:facilityFilter==="all"?"#4AB8D4":"#5a5a6a"}}>すべて</button>
          {FACILITY_TYPES.map(t=>{
            const active=facilityFilter===t.key;
            return <button key={t.key} onClick={()=>setFacilityFilter(active?"all":t.key)}
              style={{padding:"6px 14px",borderRadius:20,fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.15s",
                border:active?"1.5px solid #a07adc":"1.5px solid #35353e",
                background:active?"#a07adc20":"#26262c",
                color:active?"#a07adc":"#8888a0"}}>
              {t.icon} {t.label}
            </button>;
          })}
        </div>
      </div>

      {/* 評価項目絞り込み */}
      <div style={{marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{color:"#8888a0",fontSize:12,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>重視する項目を選択</div>
          {!isAllMode&&<button onClick={()=>setSelectedKeys([])} style={{background:"none",border:"none",cursor:"pointer",color:"#5a5a6a",fontSize:12,textDecoration:"underline"}}>リセット</button>}
        </div>
        <div style={{marginBottom:8}}>
          <button onClick={()=>setSelectedKeys([])} style={{padding:"7px 14px",borderRadius:20,fontSize:13,fontWeight:600,
            border:isAllMode?"1.5px solid #4AB8D4":"1.5px solid #35353e",
            background:isAllMode?"#4AB8D420":"#26262c",
            color:isAllMode?"#4AB8D4":"#5a5a6a",cursor:"pointer"}}>🏆 総合（全項目）</button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {CATEGORIES.map(cat=>{
            const active=selectedKeys.includes(cat.key);
            return <button key={cat.key} onClick={()=>toggleKey(cat.key)}
              style={{padding:"7px 14px",borderRadius:20,fontSize:13,fontWeight:600,
                border:active?"1.5px solid #C8956A":"1.5px solid #35353e",
                background:active?"#C8956A20":"#26262c",
                color:active?"#C8956A":"#8888a0",cursor:"pointer",position:"relative",transition:"all 0.15s"}}>
              {cat.icon} {cat.label}
              {active&&<span style={{position:"absolute",top:-5,right:-5,background:"#C8956A",borderRadius:"50%",width:16,height:16,fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",color:"#1C1C1E"}}>✓</span>}
            </button>;
          })}
        </div>
        {!isAllMode&&<div style={{marginTop:10,padding:"9px 14px",background:"#C8956A15",borderRadius:10,border:"1px solid #C8956A30",fontSize:13,color:"#C8956A"}}>
          <strong>{selectedKeys.map(k=>{const c=CATEGORIES.find(x=>x.key===k);return c?c.label:"";}).join(" + ")}</strong> の平均でランキング中
        </div>}
        <div style={{marginTop:8,padding:"7px 12px",background:"#22222a",borderRadius:8,border:"1px solid #2e2e3a"}}>
          <div style={{color:"#5a5a6a",fontSize:11,lineHeight:1.6}}>
            {isAllMode?"※ 同点の場合は「5」の評価数が多い順　※ 複数評価がある施設は平均値を表示":"※ 同点の場合は総合評価の数値が高い順　※ 複数評価がある施設は平均値を表示"}
          </div>
        </div>
      </div>

      {sorted.length===0
        ? <div style={{textAlign:"center",padding:"60px 20px",color:"#5a5a6a",fontSize:15}}>
            <div style={{fontSize:48,marginBottom:16}}>🔥</div>
            {facilityFilter==="all"?"まだサウナが登録されていません":"この施設タイプの登録がありません"}<br/>
          </div>
        : <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {sorted.map((sauna,i)=>{
              const score = customAvg(sauna.scores,isAllMode?null:selectedKeys);
              const isTop = i<3;
              const isExpanded = expandedId===sauna.id;
              const hasAddr = sauna.address && sauna.address.trim();
              return (
                <div key={sauna.id} style={{background:isTop?"linear-gradient(135deg,#26262c,#2a2820)":"#26262c",borderRadius:14,border:isTop?"1px solid "+medals[i]+"40":"1px solid #2e2e36",overflow:"hidden"}}>
                  {/* メインカード */}
                  <div style={{padding:"14px 15px",display:"flex",alignItems:"center",gap:11}}>
                    <div style={{width:34,height:34,borderRadius:"50%",flexShrink:0,background:isTop?medals[i]+"20":"#1C1C1E",border:"2px solid "+(isTop?medals[i]:"#35353e"),display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:isTop?medals[i]:"#5a5a6a"}}>{i+1}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2,flexWrap:"wrap"}}>
                        <div style={{color:"#E8EDF2",fontWeight:700,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sauna.name}</div>
                        <FacilityTypeBadge typeKey={sauna.facility_type}/>
                        {sauna._count>1&&<span style={{background:"#C8956A20",border:"1px solid #C8956A40",borderRadius:20,padding:"1px 8px",fontSize:10,color:"#C8956A",fontWeight:700}}>{sauna._count}件の平均</span>}
                      </div>
                      <div style={{display:"flex",gap:5,marginTop:3,flexWrap:"wrap"}}>
                        {CATEGORIES.map(cat=>{
                          const isSel=selectedKeys.includes(cat.key);
                          return <span key={cat.key} style={{fontSize:11,color:!isAllMode&&isSel?"#C8956A":"#5a5a6a",fontWeight:!isAllMode&&isSel?700:400}}>{cat.icon}{typeof sauna.scores[cat.key]==="number"?sauna.scores[cat.key].toFixed(sauna._count>1?1:0):"—"}</span>;
                        })}
                      </div>
                      {hasAddr&&<div style={{color:"#5a5a6a",fontSize:11,marginTop:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>📍 {sauna.address}</div>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <ScoreCircle value={score} size={52}/>
                      {!isAllMode&&<div style={{fontSize:10,color:"#8888a0",textAlign:"center"}}>総合{avg(sauna.scores).toFixed(1)}</div>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      <button onClick={()=>setExpandedId(isExpanded?null:sauna.id)}
                        style={{background:"#1C1C1E",border:"1px solid #35353e",borderRadius:7,padding:"5px 9px",color:"#8888a0",fontSize:12,cursor:"pointer"}}>
                        {isExpanded?"▲":"▼"}
                      </button>
                      <button onClick={()=>onEdit(sauna._entries[sauna._entries.length-1])} style={{background:"#1C1C1E",border:"1px solid #35353e",borderRadius:7,padding:"5px 9px",color:"#8888a0",fontSize:12,cursor:"pointer"}}>✏️</button>
                    </div>
                  </div>

                  {/* 展開パネル */}
                  {isExpanded&&(
                    <div style={{borderTop:"1px solid #2e2e36",background:"#1e1e24"}}>
                      {/* Googleマップボタン */}
                      {hasAddr&&(
                        <div style={{padding:"10px 15px 0"}}>
                          <button onClick={()=>openMap(sauna.address,sauna.name)}
                            style={{width:"100%",padding:"10px",background:"#1a2a3a",border:"1px solid #2a4a6a",borderRadius:9,color:"#4ab8d4",fontSize:13,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                            📍 Google マップで開く
                          </button>
                        </div>
                      )}
                      {/* 個別評価一覧 */}
                      {sauna._count>1&&(
                        <div style={{padding:"10px 15px"}}>
                          <div style={{color:"#5a5a6a",fontSize:11,fontWeight:600,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.06em"}}>個別評価</div>
                          {sauna._entries.map((e,ei)=>(
                            <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderTop:ei?"1px solid #2a2a30":"none"}}>
                              <span style={{color:"#6a7a8a",fontSize:12}}>👤{e.author||"匿名"}</span>
                              <span style={{color:"#5a5a6a",fontSize:11}}>総合{avg(e.scores).toFixed(1)}</span>
                              <div style={{display:"flex",gap:4,marginLeft:"auto"}}>
                                {confirmDelete===e.id
                                  ?<button onClick={()=>{onDelete(e.id);setConfirmDelete(null);}} disabled={deleting} style={{background:"#3a1a1a",border:"1px solid #5a2020",borderRadius:6,padding:"3px 8px",color:"#e05858",fontSize:11,cursor:"pointer"}}>削除確認</button>
                                  :<button onClick={()=>setConfirmDelete(e.id)} style={{background:"#1C1C1E",border:"1px solid #35353e",borderRadius:6,padding:"3px 8px",color:"#5a5a6a",fontSize:11,cursor:"pointer"}}>🗑️</button>}
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                      {sauna._count===1&&(
                        <div style={{padding:"10px 15px",display:"flex",justifyContent:"flex-end",gap:6}}>
                          {sauna._entries[0].note&&<div style={{flex:1,color:"#5a5a6a",fontSize:12,alignSelf:"center"}}>{sauna._entries[0].note}</div>}
                          {confirmDelete===sauna._entries[0].id
                            ?<button onClick={()=>{onDelete(sauna._entries[0].id);setConfirmDelete(null);}} disabled={deleting} style={{background:"#3a1a1a",border:"1px solid #5a2020",borderRadius:7,padding:"5px 10px",color:"#e05858",fontSize:12,cursor:"pointer"}}>削除確認</button>
                            :<button onClick={()=>setConfirmDelete(sauna._entries[0].id)} style={{background:"#1C1C1E",border:"1px solid #35353e",borderRadius:7,padding:"5px 10px",color:"#5a5a6a",fontSize:12,cursor:"pointer"}}>🗑️ 削除</button>}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
      }
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [page,       setPage]       = useState("rate");
  const [saunas,     setSaunas]     = useState([]);
  const [editTarget, setEditTarget] = useState(null);
  const [loading,    setLoading]    = useState(true);
  const [loadError,  setLoadError]  = useState(null);
  const [saving,     setSaving]     = useState(false);
  const [deleting,   setDeleting]   = useState(false);
  const [toast,      setToast]      = useState({msg:"",type:"ok"});
  const pollRef = useRef(null);

  const showToast = (msg,type) => { setToast({msg,type:type||"ok"}); setTimeout(()=>setToast({msg:"",type:"ok"}),3000); };

  const loadData = useCallback(async()=>{
    try { const d=await dbFetch(); setSaunas(d); setLoadError(null); }
    catch(e) { console.error(e); setLoadError(e.message); }
    finally { setLoading(false); }
  },[]);

  useEffect(()=>{ loadData(); pollRef.current=setInterval(loadData,15000); return()=>clearInterval(pollRef.current); },[]);

  const handleSave = async(data)=>{
    setSaving(true);
    try {
      if(data.id){
        await dbUpdate(data.id,{name:data.name,facility_type:data.facility_type,address:data.address,scores:data.scores,note:data.note,author:data.author,updated_at:new Date().toISOString()});
        setSaunas(p=>p.map(s=>s.id===data.id?{...s,...data}:s));
        showToast("✅ 更新しました！"); setEditTarget(null); setPage("ranking");
      } else {
        const row={id:genId(),room_id:ROOM_ID,name:data.name,facility_type:data.facility_type,address:data.address||"",scores:data.scores,note:data.note,author:data.author,created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
        const ins=await dbInsert(row); setSaunas(p=>[...p,ins[0]||row]); showToast("✅ 保存しました！");
      }
    } catch(e) { console.error(e); showToast("保存失敗: "+e.message,"error"); }
    finally { setSaving(false); }
  };

  const handleDelete = async(id)=>{
    setDeleting(true);
    try { await dbDelete(id); setSaunas(p=>p.filter(s=>s.id!==id)); showToast("削除しました"); }
    catch(e) { showToast("削除失敗: "+e.message,"error"); }
    finally { setDeleting(false); }
  };

  if(loading) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}><div style={{fontSize:48}}>🧖</div><div style={{color:"#5a5a6a",fontSize:15}}>読み込み中...</div></div>;

  if(loadError) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"0 16px"}}>
      <div style={{maxWidth:460,width:"100%",background:"#2a1a1a",border:"1px solid #5a2a2a",borderRadius:14,padding:"28px"}}>
        <div style={{fontSize:40,textAlign:"center",marginBottom:14}}>⚠️</div>
        <div style={{color:"#e05858",fontWeight:700,fontSize:16,textAlign:"center",marginBottom:12}}>接続に失敗しました</div>
        <code style={{display:"block",background:"#1a1a1a",padding:"10px 14px",borderRadius:8,color:"#e08888",fontSize:12,wordBreak:"break-all",marginBottom:16,lineHeight:1.6}}>{loadError}</code>
        <button onClick={()=>{setLoading(true);setLoadError(null);loadData();}} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#4AB8D4,#2e8fa8)",border:"none",borderRadius:10,color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"}}>🔄 再試行</button>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh"}}>
      <div style={{background:"linear-gradient(180deg,#1a1a20,#1C1C1E)",borderBottom:"1px solid #26262c",padding:"16px 14px 0",position:"sticky",top:0,zIndex:10}}>
        <div style={{maxWidth:520,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:13}}>
            <span style={{fontSize:28}}>🧖</span>
            <div>
              <h1 style={{margin:0,fontSize:20,fontWeight:800,letterSpacing:"-0.02em"}}>サ絶日記</h1>
              <div style={{color:"#5a5a6a",fontSize:11}}>
                {saunas.length>0?saunas.length+"件の評価を記録中":"サウナを評価・記録しよう"}
                {saving&&<span style={{color:"#4AB8D4",marginLeft:8}}>💾 保存中…</span>}
              </div>
            </div>
          </div>
          <div style={{display:"flex"}}>
            {[{key:"rate",label:editTarget?"✏️ 編集中":"⭐ 評価する"},{key:"ranking",label:"🏆 ランキング"+(saunas.length>0?" ("+groupByFacility(saunas).length+"施設)":"")}].map(tab=>(
              <button key={tab.key} onClick={()=>{setPage(tab.key);if(tab.key==="rate"&&page==="rate")setEditTarget(null);}}
                style={{flex:1,padding:"11px 0",fontSize:14,fontWeight:700,background:"none",border:"none",cursor:"pointer",color:page===tab.key?"#4AB8D4":"#5a5a6a",borderBottom:page===tab.key?"2px solid #4AB8D4":"2px solid transparent",transition:"all 0.2s"}}>
                {tab.label}
              </button>
            ))}
          </div>
        </div>
      </div>
      <div style={{padding:"18px 12px"}}>
        {page==="rate"
          ?<RatingPage onSave={handleSave} editTarget={editTarget} onCancelEdit={()=>{setEditTarget(null);setPage("ranking");}} saving={saving} allSaunas={saunas}/>
          :<RankingPage saunas={saunas} onEdit={s=>{setEditTarget(s);setPage("rate");}} onDelete={handleDelete} deleting={deleting}/>}
      </div>
      <Toast msg={toast.msg} type={toast.type}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
